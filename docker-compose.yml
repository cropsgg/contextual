services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: contextual-maestro-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: maestro
      POSTGRES_PASSWORD: maestro_dev
      POSTGRES_DB: maestro
    # Host 5433 avoids conflict with a local Postgres install on 5432 (Homebrew, etc.)
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maestro -d maestro"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./server
    container_name: contextual-maestro-api
    restart: unless-stopped
    env_file:
      - path: ./server/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://contextual_app:maestro_dev@postgres:5432/maestro
      ADMIN_DATABASE_URL: postgresql+psycopg2://maestro:maestro_dev@postgres:5432/maestro
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: contextual-maestro-web
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
